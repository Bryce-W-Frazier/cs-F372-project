<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Admin Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>Admin Account Creation for FakeFlix</h2>
        <form id="signupForm" name="signupForm" method="POST">
	    <select id="newRole" name="newRole" placeholder="New Role" required>
	        <option value="viewer">Viewer</option>
	        <option value="content-editor">Content Editor</option>
	        <option value="marketing-manager">Marketing Manager</option>
	        <option value="admin">Admin</option>
	    </select>
            <input type="text" id="newEmail" name="newEmail" placeholder="New Email" required>
            <br>
            <input type="password" id="newPass" name="newPass" placeholder="New Password" required>
            <br>
            <button type="submit" id="signupBtn">Create Account</button>
        </form>
        <br>
        <div style="text-align: center; margin: 20px;">
	<a href="index.html" ><button id="logoutBtn" style="background-color: red; 
	color: white; padding: 10px 20px; font-weight: bold; border: none; 
	border-radius: 5px; cursor: pointer; margin-left: 10px;">
		Log Out
	</button></a>
    </div>
    </div>

    <footer style="background-color: #111; text-align: center; padding: 15px; border-top: 1px solid #444; font-size: 12px; color: #aaa;">
        <p>&copy; 2026 FakeFlix Entertainment. All rights reserved.</p>
        <p>Contact Support: 1-800-FAKE-FLIX | support@fakeflix.com</p>
    </footer> 

    <script src="admin.js"></script>

</body>
</html>
