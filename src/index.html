<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2>Sign In</h2>
        <form id="loginForm" name="loginForm">
            <input type="text" id="userEmail" name="userEmail" placeholder="Email" required>
            <br>
            <input type="password" id="userPass" name="userPass" placeholder="Password" required>
            <br>
            <button type="submit" id="loginBtn" name="loginBtn">Log In</button>
        </form>
    </div>

    <script src="script.js"></script>

</body>
</html>
