<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stream Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2>Sign In</h2>
        <form id="loginForm" name="loginForm" method="POST">
            <input type="text" id="userEmail" name="userEmail" placeholder="Email" required>
            <br>
            <input type="password" id="userPass" name="userPass" placeholder="Password" required>
            <br>
            <button type="submit" id="loginBtn" name="loginBtn">Log In</button>
            <br><br><a href="/signup" style="color: white;">Need an account? Sign Up!</a>
        </form>
    </div>

    <footer style="background-color: #111; text-align: center; padding: 15px; border-top: 1px solid #444; font-size: 12px; color: #aaa;">
        <p>&copy; 2026 FakeFlix Entertainment. All rights reserved.</p>
        <p>Contact Support: 1-800-FAKE-FLIX | support@fakeflix.com</p>
    </footer> 

    <script src="script.js"></script>

</body>
</html>
