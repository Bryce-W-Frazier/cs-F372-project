<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FakeFlix - Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; background-color: #222; color: white; font-family: Arial, sans-serif;">

            <a href="#" style="color: white; text-decoration: none; margin: 0 10px;">Help</a>
        </nav>
    </header>

    <main style="flex: 1; padding: 20px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <input type="text" id="searchInput" placeholder="Search for movies" style="padding: 10px; width: 60%; font-size: 16px; border-radius: 5px;">
            <button id="logoutBtn" style="background-color: #E50914; color: white; padding: 10px 20px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px;">Log Out</button>
        </div>

        <table id="thumbnail_table" name="thumbnail_table" style="margin: auto; border-collapse: separate; border-spacing: 15px;">
           </table>
