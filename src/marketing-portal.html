<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Editor Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--
    <table id="thumbnail_table" name="thumbnail_table">
    </table>-->

    <h2>Messages From Team</h2>
    <div id="messages_box" name="messages_box">
    </div>

    <div style="text-align: center; margin: 20px;">
	<a href="index.html" ><button id="logoutBtn" style="background-color: red; 
	color: white; padding: 10px 20px; font-weight: bold; border: none; 
	border-radius: 5px; cursor: pointer; margin-left: 10px;">
		Log Out
	</button></a>
    </div>	

    <h2>Send Messages</h2>
    <form action="/message-to-editor" method="post">
        <label for="subject">Subject</label>
        <br>
        <input id="subject" name="subject" type="text" 
            maxlength="200" placeholder="Subject">

        <label for="message">Message</label>
        <br>
        <textarea id="message" name="message"
            placeholder="Write your message to the team."></textarea>

        <button type="submit">Send Message</button>
    </form>


    <footer style="background-color: #111; text-align: center; padding: 15px; border-top: 1px solid #444; font-size: 12px; color: #aaa;">
        <p>&copy; 2026 FakeFlix Entertainment. All rights reserved.</p>
        <p>Contact Support: 1-800-FAKE-FLIX | support@fakeflix.com</p>
    </footer> 

    <script type="module" src="marketing-portal.js"></script>

</body>
</html>
